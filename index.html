<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Gallery | Secure Photo Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Main Content -->
        <main class="main-wrapper">
            <!-- Floating Top Bar -->
            <header class="floating-header">
                <div class="header-content glass-card">
                    <div class="header-left">
                        <i data-lucide="camera" class="logo-icon"></i>
                        <nav id="breadcrumbs" class="breadcrumbs">
                            <span class="breadcrumb-item" data-path="">Vault</span>
                        </nav>
                    </div>
                    
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="imageSearch" placeholder="Search files...">
                    </div>

                    <div class="header-right">
                        <button id="newFolderBtn" class="icon-btn" title="New Folder">
                            <i data-lucide="folder-plus"></i>
                        </button>
                        <div class="user-chip">
                            <span>R</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-viewport">
                <div id="galleryGrid" class="gallery-grid">
                    <!-- Items -->
                </div>
            </div>

            <!-- Floating Action Button -->
            <button class="fab-btn" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="plus"></i>
                <span>Upload</span>
            </button>
            <input type="file" id="fileInput" hidden multiple>
        </main>
    </div>


    <!-- Upload Progress Toast -->
    <div id="uploadStatus" class="upload-toast hidden">
        <div class="spinner-sm"></div>
        <span>Uploading...</span>
    </div>

        <!-- Modals -->
        <div id="newFolderModal" class="modal hidden">
            <div class="modal-content glass-card">
                <div class="modal-header">
                    <h2>Create New Folder</h2>
                    <button id="closeFolderModal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label for="folderName">Folder Name</label>
                        <input type="text" id="folderName" placeholder="e.g. Summer Trip">
                    </div>
                    <button id="confirmCreateFolder" class="primary-btn">Create Folder</button>
                </div>
            </div>
        </div>

        <div id="imageModal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="viewer-content">
                <div class="viewer-actions">
                    <button id="viewerZoom" class="icon-btn" title="Toggle Zoom"><i data-lucide="maximize-2"></i></button>
                    <button id="viewerDownload" class="icon-btn" title="Download"><i data-lucide="download"></i></button>
                    <button id="viewerDelete" class="icon-btn danger-hover" title="Delete"><i data-lucide="trash-2"></i></button>
                    <button id="closeViewer" class="icon-btn close-btn" title="Close"><i data-lucide="x"></i></button>
                </div>

                <button id="prevBtn" class="nav-arrow left"><i data-lucide="chevron-left"></i></button>
                <div class="viewer-media-container">
                    <img id="viewerImage" src="" alt="Full view" class="hidden">
                    <video id="viewerVideo" controls class="hidden"></video>
                </div>
                <button id="nextBtn" class="nav-arrow right"><i data-lucide="chevron-right"></i></button>
                <div id="fileDownloadView" class="hidden">
                    <i data-lucide="file-text" style="width: 100px; height: 100px; margin-bottom: 1rem;"></i>
                    <p>File preview not supported</p>
                </div>
            </div>
        </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal hidden">
        <div class="modal-content glass-card delete-modal-content">
            <div class="modal-body text-center">
                <div class="warning-icon">
                    <i data-lucide="alert-triangle"></i>
                </div>
                <h2 id="deleteModalTitle">Delete Item?</h2>
                <p id="deleteModalDesc">This action cannot be undone. Are you sure you want to delete <strong id="deleteFileName">item</strong>?</p>
                <div class="modal-footer">
                    <button id="cancelDelete" class="secondary-btn">Cancel</button>
                    <button id="confirmDelete" class="danger-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
